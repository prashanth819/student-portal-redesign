<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TKREC Portal | Secure Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;800&family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="login.css">
</head>
<body>

  <!-- Dynamic WebGL/Canvas Background -->
  <canvas id="particle-canvas"></canvas>
  
  <!-- Animated Background Orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <main class="login-container">
    <div class="login-split-layout fade-in-up">
      
      <!-- Left: Branding & Graphic -->
      <div class="login-branding">
        <div class="brand-content">
          <div class="logo-badge reveal-delay-1">
            <i class="fa-solid fa-graduation-cap"></i>
          </div>
          <h1 class="brand-title reveal-delay-2">TKREC<span class="dot">.</span></h1>
          <h2 class="brand-subtitle reveal-delay-3">Teegala Krishna Reddy<br>Engineering College</h2>
          <p class="brand-desc reveal-delay-4">Welcome to the next-generation academic portal. Access your classes, performance analytics, and dynamic schedules in a unified, modern interface.</p>
        </div>
      </div>

      <!-- Right: Glassmorphism Form -->
      <div class="login-form-wrapper reveal-delay-2">
        <div class="glass-card">
          
          <div class="form-header">
            <h3>Welcome Back</h3>
            <p>Enter your credentials to continue</p>
          </div>

          <form id="loginForm" action="index.html" method="GET">
            
            <div class="input-group">
              <i class="fa-solid fa-id-card input-icon"></i>
              <input type="text" id="rollno" required autocomplete="off" placeholder=" ">
              <label for="rollno">Roll Number (e.g. 24CS1045)</label>
              <div class="input-highlight"></div>
            </div>

            <div class="input-group">
              <i class="fa-solid fa-lock input-icon"></i>
              <input type="password" id="password" required placeholder=" ">
              <label for="password">Password</label>
              <div class="input-highlight"></div>
              <button type="button" class="eye-toggle" id="togglePassword">
                <i class="fa-solid fa-eye"></i>
              </button>
            </div>

            <div class="form-options">
              <label class="remember-me">
                <input type="checkbox" checked>
                <span class="checkmark"></span>
                <span>Remember me</span>
              </label>
              <a href="#" class="forgot-link">Forgot Password?</a>
            </div>

            <button type="submit" class="btn-submit">
              <span id="btnText">Sign In to Portal</span>
              <i class="fa-solid fa-arrow-right btn-icon hidden-on-load"></i>
              <div class="btn-glow"></div>
            </button>

          </form>

        </div>
      </div>
      
    </div>
  </main>

  <script src="login.js"></script>
</body>
</html>
